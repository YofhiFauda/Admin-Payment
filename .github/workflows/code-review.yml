name: Code Review Automation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted]

jobs:
  # ─────────────────────────────────────────
  #  PR Validation
  # ─────────────────────────────────────────
  pr-validation:
    name: PR Validation
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Check PR title format
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
      
      - name: Check PR size
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const additions = pr.additions;
            const deletions = pr.deletions;
            const changes = additions + deletions;
            
            let label = '';
            let message = '';
            
            if (changes < 100) {
              label = 'size/XS';
              message = '✅ Extra Small PR - Easy to review!';
            } else if (changes < 300) {
              label = 'size/S';
              message = '✅ Small PR - Good size for review';
            } else if (changes < 600) {
              label = 'size/M';
              message = '⚠️ Medium PR - Consider splitting if possible';
            } else if (changes < 1000) {
              label = 'size/L';
              message = '⚠️ Large PR - Please consider splitting';
            } else {
              label = 'size/XL';
              message = '❌ Extra Large PR - Should be split into smaller PRs';
            }
            
            // Add label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: [label]
            });
            
            // Add comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: `${message}\n\n📊 **Changes:** ${changes} lines (+${additions}/-${deletions})`
            });
      
      - name: Check for merge conflicts
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (pr.mergeable === false) {
              core.setFailed('❌ This PR has merge conflicts. Please resolve them.');
            }

  # ─────────────────────────────────────────
  #  Automated Code Review
  # ─────────────────────────────────────────
  automated-review:
    name: Automated Code Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json
          coverage: none
      
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress
      
      - name: Run Laravel Pint with reviewdog
        uses: reviewdog/action-suggester@v1
        with:
          tool_name: Laravel Pint
          level: warning
          filter_mode: diff_context
      
      - name: Check for debug statements
        run: |
          if git diff origin/${{ github.base_ref }}...HEAD | grep -E "(dd\(|dump\(|var_dump\(|print_r\(|console\.log\(|debugger)"; then
            echo "❌ Debug statements found in the code"
            exit 1
          fi
      
      - name: Check for TODO comments
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const todos = execSync('git diff origin/${{ github.base_ref }}...HEAD | grep -i "TODO\\|FIXME\\|XXX" || true').toString();
            
            if (todos) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `⚠️ **TODO/FIXME comments found:**\n\`\`\`\n${todos}\n\`\`\`\nPlease address these before merging.`
              });
            }
      
      - name: Check for sensitive data
        run: |
          if git diff origin/${{ github.base_ref }}...HEAD | grep -iE "(password|secret|api_key|token|private_key|aws_access|credential).*=.*['\"]"; then
            echo "❌ Potential sensitive data found in the code"
            exit 1
          fi

  # ─────────────────────────────────────────
  #  Security Review
  # ─────────────────────────────────────────
  security-review:
    name: Security Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run Trivy security scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: Check for SQL injection risks
        run: |
          if git diff origin/${{ github.base_ref }}...HEAD -- '*.php' | grep -E "DB::raw\(.*\\\$|->whereRaw\(.*\\\$|->selectRaw\(.*\\\$"; then
            echo "⚠️ Potential SQL injection risk detected. Please use parameter binding."
          fi

  # ─────────────────────────────────────────
  #  Database Review
  # ─────────────────────────────────────────
  database-review:
    name: Database Changes Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Check for migration changes
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const migrations = execSync('git diff --name-only origin/${{ github.base_ref }}...HEAD | grep "database/migrations" || true').toString();
            
            if (migrations) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `📊 **Database Migration Detected**\n\n` +
                      `Please ensure:\n` +
                      `- [ ] Migration is reversible (down method implemented)\n` +
                      `- [ ] Migration tested on a copy of production data\n` +
                      `- [ ] No data loss will occur\n` +
                      `- [ ] Migration is idempotent\n` +
                      `- [ ] Indexes added for foreign keys\n` +
                      `- [ ] Consider impact on large tables\n\n` +
                      `**Changed files:**\n${migrations}`
              });
              
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: ['database-changes']
              });
            }

  # ─────────────────────────────────────────
  #  Test Coverage Review
  # ─────────────────────────────────────────
  coverage-review:
    name: Test Coverage Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json, bcmath, pdo_mysql
          coverage: xdebug
      
      - name: Copy .env
        run: |
          cp .env.example .env
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=root/' .env
      
      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction
      
      - name: Generate key
        run: php artisan key:generate
      
      - name: Run migrations
        run: php artisan migrate --force
      
      - name: Run tests with coverage
        run: php artisan test --coverage --coverage-clover=coverage.xml
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: pr-${{ github.event.pull_request.number }}
      
      - name: Comment coverage on PR
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────────
  #  Performance Review
  # ─────────────────────────────────────────
  performance-review:
    name: Performance Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Check for N+1 query patterns
        run: |
          if git diff origin/${{ github.base_ref }}...HEAD -- '*.php' | grep -E "foreach.*->.*->"; then
            echo "⚠️ Potential N+1 query detected. Consider using eager loading."
          fi
      
      - name: Check for missing indexes
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const migrations = execSync('git diff origin/${{ github.base_ref }}...HEAD -- "database/migrations/*.php" || true').toString();
            
            if (migrations.includes('foreign(') && !migrations.includes('index(')) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `⚠️ **Performance Warning:** Foreign keys detected without explicit indexes. Consider adding indexes for better query performance.`
              });
            }

  # ─────────────────────────────────────────
  #  Auto-label PRs
  # ─────────────────────────────────────────
  auto-label:
    name: Auto Label PR
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Label based on changed files
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const changedFiles = execSync('git diff --name-only origin/${{ github.base_ref }}...HEAD').toString();
            const labels = [];
            
            if (changedFiles.includes('app/Http/Controllers/')) labels.push('backend');
            if (changedFiles.includes('resources/views/') || changedFiles.includes('resources/js/')) labels.push('frontend');
            if (changedFiles.includes('database/migrations/')) labels.push('database');
            if (changedFiles.includes('tests/')) labels.push('tests');
            if (changedFiles.includes('.github/workflows/')) labels.push('ci/cd');
            if (changedFiles.includes('docker')) labels.push('docker');
            if (changedFiles.includes('.md')) labels.push('documentation');
            if (changedFiles.includes('app/Models/')) labels.push('models');
            if (changedFiles.includes('app/Services/')) labels.push('services');
            if (changedFiles.includes('app/Jobs/')) labels.push('jobs');
            if (changedFiles.includes('app/Notifications/')) labels.push('notifications');
            
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: labels
              });
            }

  # ─────────────────────────────────────────
  #  Review Reminder
  # ─────────────────────────────────────────
  review-reminder:
    name: Review Reminder
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - name: Check review status
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });
            
            const approvals = reviews.data.filter(r => r.state === 'APPROVED').length;
            const changesRequested = reviews.data.filter(r => r.state === 'CHANGES_REQUESTED').length;
            
            if (approvals === 0 && changesRequested === 0) {
              const age = Date.now() - new Date(pr.created_at).getTime();
              const hours = Math.floor(age / (1000 * 60 * 60));
              
              if (hours > 24) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: `⏰ This PR has been open for ${hours} hours without review. @${pr.user.login} please request reviewers.`
                });
              }
            }
