name: Deploy to aaPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PHP_VERSION: '8.4'

jobs:
  # ─────────────────────────────────────────
  #  Run Tests
  # ─────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, json, bcmath, pdo_mysql, redis, gd, zip
          coverage: none
      
      - name: Copy .env
        run: |
          cp .env.example .env
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=root/' .env
          sed -i 's/REDIS_HOST=.*/REDIS_HOST=127.0.0.1/' .env
      
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress
      
      - name: Generate application key
        run: php artisan key:generate
      
      - name: Run migrations
        run: php artisan migrate --force
      
      - name: Run tests
        run: php artisan test
      
      - name: Security audit
        run: composer audit

  # ─────────────────────────────────────────
  #  Deploy to aaPanel Server
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to aaPanel Server
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: production
      url: https://yourdomain.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
      
      - name: Deploy application
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'
            set -e
            
            echo "🚀 Starting deployment to aaPanel..."
            
            # Navigate to project directory
            cd ${{ secrets.DEPLOY_PATH }}
            
            # ═══════════════════════════════════════════════════════════
            #  STEP 1: Backup current state
            # ═══════════════════════════════════════════════════════════
            echo "💾 Creating backup..."
            
            # Backup database
            BACKUP_DIR="/www/backup/$(date +%Y%m%d_%H%M%S)"
            mkdir -p $BACKUP_DIR
            
            # Get database credentials from .env
            DB_NAME=$(grep DB_DATABASE .env | cut -d '=' -f2)
            DB_USER=$(grep DB_USERNAME .env | cut -d '=' -f2)
            DB_PASS=$(grep DB_PASSWORD .env | cut -d '=' -f2)
            
            mysqldump -u "$DB_USER" -p"$DB_PASS" "$DB_NAME" | gzip > "$BACKUP_DIR/database.sql.gz"
            echo "✅ Database backed up to $BACKUP_DIR"
            
            # ═══════════════════════════════════════════════════════════
            #  STEP 2: Enable maintenance mode
            # ═══════════════════════════════════════════════════════════
            echo "🔧 Enabling maintenance mode..."
            php artisan down --retry=60 --render="errors::503" || true
            
            # ═══════════════════════════════════════════════════════════
            #  STEP 3: Pull latest code
            # ═══════════════════════════════════════════════════════════
            echo "📥 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main
            
            # ═══════════════════════════════════════════════════════════
            #  STEP 4: Install dependencies
            # ═══════════════════════════════════════════════════════════
            echo "📦 Installing Composer dependencies..."
            /usr/bin/composer install --no-dev --optimize-autoloader --no-interaction
            
            echo "📦 Installing NPM dependencies..."
            npm ci --production
            
            # ═══════════════════════════════════════════════════════════
            #  STEP 5: Build assets
            # ═══════════════════════════════════════════════════════════
            echo "🏗️  Building assets..."
            npm run build
            
            # ═══════════════════════════════════════════════════════════
            #  STEP 6: Run migrations
            # ═══════════════════════════════════════════════════════════
            echo "🗄️  Running migrations..."
            php artisan migrate --force
            
            # ═══════════════════════════════════════════════════════════
            #  STEP 7: Clear and cache
            # ═══════════════════════════════════════════════════════════
            echo "⚡ Clearing caches..."
            php artisan cache:clear
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            
            echo "⚡ Rebuilding caches..."
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache
            
            # ═══════════════════════════════════════════════════════════
            #  STEP 8: Set permissions
            # ═══════════════════════════════════════════════════════════
            echo "🔐 Setting permissions..."
            chown -R www:www ${{ secrets.DEPLOY_PATH }}
            chmod -R 755 ${{ secrets.DEPLOY_PATH }}
            chmod -R 775 ${{ secrets.DEPLOY_PATH }}/storage
            chmod -R 775 ${{ secrets.DEPLOY_PATH }}/bootstrap/cache
            
            # ═══════════════════════════════════════════════════════════
            #  STEP 9: Restart services
            # ═══════════════════════════════════════════════════════════
            echo "🔄 Restarting services..."
            
            # Restart PHP-FPM
            systemctl restart php-fpm-84
            
            # Restart Horizon
            if command -v supervisorctl &> /dev/null; then
              supervisorctl restart laravel-horizon || echo "⚠️  Horizon not configured"
              supervisorctl restart laravel-reverb || echo "⚠️  Reverb not configured"
            fi
            
            # Restart NGINX
            systemctl reload nginx
            
            # ═══════════════════════════════════════════════════════════
            #  STEP 10: Health check
            # ═══════════════════════════════════════════════════════════
            echo "🏥 Running health checks..."
            
            # Wait a bit for services to start
            sleep 5
            
            # Check if application responds
            if curl -f http://localhost/ping > /dev/null 2>&1; then
              echo "✅ Health check passed"
            else
              echo "❌ Health check failed!"
              # Don't exit, let maintenance mode disable
            fi
            
            # ═══════════════════════════════════════════════════════════
            #  STEP 11: Disable maintenance mode
            # ═══════════════════════════════════════════════════════════
            echo "✨ Disabling maintenance mode..."
            php artisan up
            
            # ═══════════════════════════════════════════════════════════
            #  STEP 12: Cleanup
            # ═══════════════════════════════════════════════════════════
            echo "🧹 Cleaning up..."
            
            # Remove old backups (keep last 7 days)
            find /www/backup -type d -mtime +7 -exec rm -rf {} + 2>/dev/null || true
            
            # Clear old logs
            find ${{ secrets.DEPLOY_PATH }}/storage/logs -name "*.log" -mtime +7 -exec gzip {} \; 2>/dev/null || true
            find ${{ secrets.DEPLOY_PATH }}/storage/logs -name "*.log.gz" -mtime +30 -delete 2>/dev/null || true
            
            echo "✅ Deployment completed successfully!"
            echo "📊 Deployment summary:"
            echo "  - Time: $(date)"
            echo "  - Backup: $BACKUP_DIR"
            echo "  - Git commit: $(git rev-parse --short HEAD)"
            
          ENDSSH
      
      - name: Verify deployment
        run: |
          echo "🔍 Verifying deployment..."
          sleep 10
          
          # Check if site is accessible
          if curl -f https://yourdomain.com/ping; then
            echo "✅ Site is accessible"
          else
            echo "❌ Site is not accessible"
            exit 1
          fi
          
          # Check health endpoint
          if curl -f https://yourdomain.com/health; then
            echo "✅ Health check passed"
          else
            echo "⚠️  Health check failed"
          fi
      
      - name: Notify deployment success
        if: success()
        run: |
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
              -H 'Content-Type: application/json' \
              -d '{
                "text": "✅ aaPanel deployment successful",
                "attachments": [{
                  "color": "good",
                  "fields": [
                    {"title": "Environment", "value": "Production (aaPanel)", "short": true},
                    {"title": "Commit", "value": "${{ github.sha }}", "short": true},
                    {"title": "Deployed by", "value": "${{ github.actor }}", "short": true},
                    {"title": "Time", "value": "'"$(date)"'", "short": true}
                  ]
                }]
              }'
          fi
      
      - name: Notify deployment failure
        if: failure()
        run: |
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
              -H 'Content-Type: application/json' \
              -d '{
                "text": "❌ aaPanel deployment failed",
                "attachments": [{
                  "color": "danger",
                  "fields": [
                    {"title": "Environment", "value": "Production (aaPanel)", "short": true},
                    {"title": "Commit", "value": "${{ github.sha }}", "short": true},
                    {"title": "Deployed by", "value": "${{ github.actor }}", "short": true},
                    {"title": "Time", "value": "'"$(date)"'", "short": true}
                  ]
                }]
              }'
          fi

  # ─────────────────────────────────────────
  #  Rollback (Manual)
  # ─────────────────────────────────────────
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: production
    
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      - name: Rollback to previous version
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'
            set -e
            
            echo "⏪ Starting rollback..."
            
            cd ${{ secrets.DEPLOY_PATH }}
            
            # Enable maintenance mode
            php artisan down
            
            # Rollback git
            git reset --hard HEAD~1
            
            # Install dependencies
            /usr/bin/composer install --no-dev --optimize-autoloader
            
            # Rollback migrations (optional)
            # php artisan migrate:rollback --step=1 --force
            
            # Clear and cache
            php artisan cache:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # Restart services
            systemctl restart php-fpm-84
            supervisorctl restart laravel-horizon || true
            supervisorctl restart laravel-reverb || true
            systemctl reload nginx
            
            # Disable maintenance mode
            php artisan up
            
            echo "✅ Rollback completed!"
          ENDSSH
