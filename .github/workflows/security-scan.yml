name: Security Scan

on:
  schedule:
    # Run every day at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────
  #  Dependency Scanning
  # ─────────────────────────────────────────
  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
      
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction
      
      - name: Composer audit
        run: composer audit --format=json > composer-audit.json || true
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install NPM dependencies
        run: npm ci
      
      - name: NPM audit
        run: npm audit --json > npm-audit.json || true
      
      - name: Upload audit results
        uses: actions/upload-artifact@v3
        with:
          name: security-audit
          path: |
            composer-audit.json
            npm-audit.json

  # ─────────────────────────────────────────
  #  SAST (Static Application Security Testing)
  # ─────────────────────────────────────────
  sast:
    name: Static Security Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # ─────────────────────────────────────────
  #  Docker Image Scanning
  # ─────────────────────────────────────────
  docker-scan:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build Docker image
        run: docker build -f Dockerfile.prod -t whusnet-app:test .
      
      - name: Run Trivy scanner on Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'whusnet-app:test'
          format: 'sarif'
          output: 'trivy-docker-results.sarif'
      
      - name: Upload Docker scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-docker-results.sarif'

  # ─────────────────────────────────────────
  #  Notify Results
  # ─────────────────────────────────────────
  notify:
    name: Notify Security Results
    runs-on: ubuntu-latest
    needs: [dependency-scan, sast, docker-scan]
    if: always()
    
    steps:
      - name: Send notification
        run: |
          if [ "${{ needs.dependency-scan.result }}" == "failure" ] || \
             [ "${{ needs.sast.result }}" == "failure" ] || \
             [ "${{ needs.docker-scan.result }}" == "failure" ]; then
            STATUS="⚠️ Security vulnerabilities detected"
            COLOR="warning"
          else
            STATUS="✅ No security issues found"
            COLOR="good"
          fi
          
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \"$STATUS\",
              \"attachments\": [{
                \"color\": \"$COLOR\",
                \"fields\": [
                  {\"title\": \"Dependency Scan\", \"value\": \"${{ needs.dependency-scan.result }}\", \"short\": true},
                  {\"title\": \"SAST\", \"value\": \"${{ needs.sast.result }}\", \"short\": true},
                  {\"title\": \"Docker Scan\", \"value\": \"${{ needs.docker-scan.result }}\", \"short\": true}
                ]
              }]
            }"
