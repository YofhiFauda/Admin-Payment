name: Deploy to Production

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (use with caution)'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DEPLOY_PATH: /var/www/admin-payment

jobs:
  # ─────────────────────────────────────────
  #  Test & Build
  # ─────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json, bcmath, pdo_mysql, redis, gd, zip
          coverage: none
      
      - name: Copy .env
        run: |
          cp .env.example .env
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=root/' .env
          sed -i 's/REDIS_HOST=.*/REDIS_HOST=127.0.0.1/' .env
      
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress
      
      - name: Generate application key
        run: php artisan key:generate
      
      - name: Run migrations
        run: php artisan migrate --force
      
      - name: Run tests
        run: php artisan test
      
      - name: Security audit
        run: composer audit

  # ─────────────────────────────────────────
  #  Build & Push Docker Image
  # ─────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: ${{ always() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_version: ${{ steps.version.outputs.version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set version
        id: version
        run: echo "version=${{ github.sha }}" >> $GITHUB_OUTPUT
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_ENV=production

  # ─────────────────────────────────────────
  #  Deploy to Production (ZERO DOWNTIME)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    environment: 
      name: "Production"
      url: https://dev.whusnet.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      - name: Add server to known hosts
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts
      
      - name: Create deployment directory
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          ssh $SERVER_USER@$SERVER_HOST "mkdir -p ${{ env.DEPLOY_PATH }}/backups"
      
      - name: Copy deployment files
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          scp docker-compose.prod.yml $SERVER_USER@$SERVER_HOST:${{ env.DEPLOY_PATH }}/docker-compose.yml
          scp -r docker $SERVER_USER@$SERVER_HOST:${{ env.DEPLOY_PATH }}/
      
      - name: Copy .env file
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          echo "$ENV_FILE" | ssh $SERVER_USER@$SERVER_HOST "cat > ${{ env.DEPLOY_PATH }}/.env"
      
      - name: Deploy application (Zero Downtime)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_VERSION: ${{ needs.build.outputs.image_version }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          ssh $SERVER_USER@$SERVER_HOST << 'ENDSSH'
            set -e
            cd ${{ env.DEPLOY_PATH }}
            
            # Load environment variables
            set -a
            source .env
            set +a
            
            # Login to GitHub Container Registry
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Set image version
            export APP_VERSION=${{ needs.build.outputs.image_version }}
            
            echo "🚀 Starting zero-downtime deployment..."
            echo "📦 Image version: ${APP_VERSION}"
            
            # ═══════════════════════════════════════════════════════════
            #  STEP 1: Pull new images
            # ═══════════════════════════════════════════════════════════
            echo "� Pulling new Docker images..."
            docker-compose pull app horizon reverb scheduler
            
            # ═══════════════════════════════════════════════════════════
            #  STEP 2: Backup database
            # ═══════════════════════════════════════════════════════════
            echo "💾 Backing up database..."
            BACKUP_FILE="backups/backup_$(date +%Y%m%d_%H%M%S).sql.gz"
            
            if docker ps --format '{{.Names}}' | grep -q "^whusnet-db$"; then
              docker-compose exec -T db mysqldump -u root -p"${DB_PASSWORD}" "${DB_DATABASE}" 2>/dev/null | gzip > "${BACKUP_FILE}" && \
                echo "✅ Database backed up to ${BACKUP_FILE}" || \
                echo "⚠️  Backup failed, continuing..."
              
              # Keep only last 7 backups
              ls -t backups/backup_*.sql.gz 2>/dev/null | tail -n +8 | xargs -r rm
            else
              echo "⚠️  Database container not running, skipping backup"
            fi
            
            # ═══════════════════════════════════════════════════════════
            #  STEP 3: Create temporary blue-green deployment
            # ═══════════════════════════════════════════════════════════
            echo "� Starting new app container (blue-green deployment)..."
            
            # Remove container_name constraint temporarily for blue-green
            sed -i 's/container_name: whusnet-app/#container_name: whusnet-app/' docker-compose.yml
            
            # Start new container alongside old one
            docker-compose up -d --no-deps --scale app=2 app
            
            # Restore container_name
            sed -i 's/#container_name: whusnet-app/container_name: whusnet-app/' docker-compose.yml
            
            # Wait for new container to be ready
            echo "⏳ Waiting for new container to be healthy..."
            sleep 15
            
            # Get the new container (the one created most recently)
            NEW_CONTAINER=$(docker ps --filter "label=com.docker.compose.service=app" --format "{{.Names}}" --latest)
            echo "🆕 New container: ${NEW_CONTAINER}"
            
            # Health check on new container
            echo "🏥 Running health checks on new container..."
            for i in {1..30}; do
              if docker exec "${NEW_CONTAINER}" php artisan list > /dev/null 2>&1; then
                echo "✅ New container is healthy"
                break
              fi
              
              if [ $i -eq 30 ]; then
                echo "❌ New container failed health check"
                docker logs "${NEW_CONTAINER}" --tail 50
                exit 1
              fi
              
              echo "⏳ Waiting for new container... ($i/30)"
              sleep 2
            done
            
            # ═══════════════════════════════════════════════════════════
            #  STEP 4: Run migrations on new container
            # ═══════════════════════════════════════════════════════════
            echo "🗄️  Running migrations..."
            docker exec "${NEW_CONTAINER}" php artisan migrate --force
            
            # ═══════════════════════════════════════════════════════════
            #  STEP 5: Optimize on new container
            # ═══════════════════════════════════════════════════════════
            echo "⚡ Optimizing application..."
            docker exec "${NEW_CONTAINER}" php artisan config:cache
            docker exec "${NEW_CONTAINER}" php artisan route:cache
            docker exec "${NEW_CONTAINER}" php artisan view:cache
            docker exec "${NEW_CONTAINER}" php artisan event:cache
            
            # ═══════════════════════════════════════════════════════════
            #  STEP 6: Switch NGINX to new container
            # ═══════════════════════════════════════════════════════════
            echo "🔄 Switching NGINX to new container..."
            
            # Get old container
            OLD_CONTAINER=$(docker ps --filter "label=com.docker.compose.service=app" --format "{{.Names}}" | grep -v "${NEW_CONTAINER}" | head -n 1)
            
            if [ -n "${OLD_CONTAINER}" ]; then
              echo "🔴 Old container: ${OLD_CONTAINER}"
              
              # Gracefully stop old container (give it 30s to finish requests)
              echo "⏳ Gracefully stopping old container..."
              docker stop -t 30 "${OLD_CONTAINER}"
              docker rm "${OLD_CONTAINER}"
              echo "✅ Old container removed"
            fi
            
            # Recreate NGINX to ensure it connects to the new container
            docker-compose up -d --force-recreate nginx
            
            # Wait for NGINX
            sleep 5
            
            # ═══════════════════════════════════════════════════════════
            #  STEP 7: Ensure single app container with correct name
            # ═══════════════════════════════════════════════════════════
            echo "� Ensuring single app container..."
            docker-compose up -d --no-deps app
            
            # ═══════════════════════════════════════════════════════════
            #  STEP 8: Update background services
            # ═══════════════════════════════════════════════════════════
            echo "� Updating background services..."
            docker-compose up -d --no-deps horizon reverb scheduler
            
            # ═══════════════════════════════════════════════════════════
            #  STEP 9: Health checks
            # ═══════════════════════════════════════════════════════════
            echo "🏥 Running final health checks..."
            
            # Check internal health
            for i in {1..10}; do
              if curl -f -s http://localhost/ping > /dev/null 2>&1 || \
                 curl -f -s http://localhost/health > /dev/null 2>&1 || \
                 docker-compose exec -T app php artisan list > /dev/null 2>&1; then
                echo "✅ Health check passed"
                break
              fi
              
              if [ $i -eq 10 ]; then
                echo "⚠️  Health check failed, but deployment completed"
                docker-compose ps
                docker-compose logs --tail 20 app
              fi
              
              echo "⏳ Waiting for health check... ($i/10)"
              sleep 3
            done
            
            # ═══════════════════════════════════════════════════════════
            #  STEP 10: Cleanup
            # ═══════════════════════════════════════════════════════════
            echo "🧹 Cleaning up..."
            docker image prune -f --filter "until=24h"
            
            # ═══════════════════════════════════════════════════════════
            #  STEP 11: Summary
            # ═══════════════════════════════════════════════════════════
            echo ""
            echo "✅ Deployment completed successfully!"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "📊 Deployment Summary:"
            echo "  • Version: ${APP_VERSION}"
            echo "  • Time: $(date)"
            echo "  • Backup: ${BACKUP_FILE}"
            echo ""
            echo "� Running containers:"
            docker-compose ps
            
          ENDSSH
      
      - name: Verify deployment
        run: |
          echo "🔍 Verifying external access..."
          sleep 10
          
          # Try multiple endpoints
          if curl -f -s https://yourdomain.com/ping > /dev/null 2>&1 || \
             curl -f -s https://yourdomain.com/health > /dev/null 2>&1; then
            echo "✅ Site is accessible"
          else
            echo "⚠️  External health check failed (might be expected if domain not configured)"
          fi
      
      - name: Notify deployment success
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d '{
                "text": "✅ Production deployment successful",
                "attachments": [{
                  "color": "good",
                  "fields": [
                    {"title": "Environment", "value": "Production", "short": true},
                    {"title": "Version", "value": "${{ github.sha }}", "short": true},
                    {"title": "Deployed by", "value": "${{ github.actor }}", "short": true},
                    {"title": "Downtime", "value": "~0 seconds", "short": true}
                  ]
                }]
              }' || echo "⚠️  Slack notification failed"
          fi
      
      - name: Notify deployment failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d '{
                "text": "❌ Production deployment failed",
                "attachments": [{
                  "color": "danger",
                  "fields": [
                    {"title": "Environment", "value": "Production", "short": true},
                    {"title": "Version", "value": "${{ github.sha }}", "short": true},
                    {"title": "Deployed by", "value": "${{ github.actor }}", "short": true},
                    {"title": "Workflow", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false}
                  ]
                }]
              }' || echo "⚠️  Slack notification failed"
          fi

  # ─────────────────────────────────────────
  #  Rollback (Manual)
  # ─────────────────────────────────────────
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: "production"
    
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      - name: Add server to known hosts
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts
      
      - name: Rollback to previous version
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          ssh $SERVER_USER@$SERVER_HOST << 'ENDSSH'
            set -e
            cd ${{ env.DEPLOY_PATH }}
            
            echo "⏪ Starting rollback..."
            
            # Get previous image tag
            PREVIOUS_IMAGE=$(docker images "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" --format "{{.Tag}}" | grep -v latest | head -n 2 | tail -n 1)
            
            if [ -z "${PREVIOUS_IMAGE}" ]; then
              echo "❌ No previous image found"
              exit 1
            fi
            
            echo "📦 Rolling back to: ${PREVIOUS_IMAGE}"
            
            # Set previous version
            export APP_VERSION="${PREVIOUS_IMAGE}"
            
            # Pull previous image
            docker-compose pull app horizon reverb scheduler
            
            # Restart services with previous image
            docker-compose up -d --force-recreate app horizon reverb scheduler nginx
            
            # Wait for health
            sleep 15
            
            # Health check
            if docker-compose exec -T app php artisan list > /dev/null 2>&1; then
              echo "✅ Rollback completed successfully"
              docker-compose ps
            else
              echo "❌ Rollback health check failed"
              docker-compose logs --tail 50 app
              exit 1
            fi
            
          ENDSSH
      
      - name: Notify rollback
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            STATUS="${{ job.status }}"
            COLOR="warning"
            [ "${STATUS}" = "success" ] && COLOR="good" || COLOR="danger"
            
            curl -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d "{
                \"text\": \"⏪ Rollback ${STATUS}\",
                \"attachments\": [{
                  \"color\": \"${COLOR}\",
                  \"fields\": [
                    {\"title\": \"Environment\", \"value\": \"Production\", \"short\": true},
                    {\"title\": \"Triggered by\", \"value\": \"${{ github.actor }}\", \"short\": true}
                  ]
                }]
              }" || echo "⚠️  Slack notification failed"
          fi
