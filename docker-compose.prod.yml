# docker-compose.prod.yml — WHUSNET Admin Payment (Production)

services:

  # ─────────────────────────────────────────
  #  APP — Laravel PHP-FPM
  # ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: whusnet-app-prod
    restart: always
    working_dir: /var/www
    volumes:
      - storage_data:/var/www/storage
      - cache_data:/var/www/bootstrap/cache
    environment:
      APP_KEY: ${APP_KEY}
      APP_ENV: production
      APP_DEBUG: false
      APP_URL: ${APP_URL}
      QUEUE_CONNECTION: redis
      CACHE_DRIVER: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      DB_HOST: db
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "php artisan list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # ─────────────────────────────────────────
  #  NGINX
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: whusnet-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf
      - storage_data:/var/www/storage
    depends_on:
      - app
    networks:
      - app_network

  # ─────────────────────────────────────────
  #  DATABASE MySQL
  # ─────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: whusnet-db-prod
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD} # Not ideal, but matching dev for now. In real prod, use distinct root & user passwords
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - app_network

  # ─────────────────────────────────────────
  #  HORIZON - Queue Monitoring
  # ─────────────────────────────────────────
  horizon:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: whusnet-horizon-prod
    restart: always
    working_dir: /var/www
    command: php artisan horizon
    volumes:
      - storage_data:/var/www/storage
      - cache_data:/var/www/bootstrap/cache
    environment:
      APP_KEY: ${APP_KEY}
      APP_ENV: production
      QUEUE_CONNECTION: redis
      CACHE_DRIVER: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      DB_HOST: db
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
      db:
        condition: service_started
    networks:
      - app_network

  # ─────────────────────────────────────────
  #  REDIS — Queue + Cache + Lock + Throttle
  # ─────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: whusnet-redis-prod
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
    volumes:
      - redis_data:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  #  REVERB — WebSocket Server
  # ─────────────────────────────────────────
  reverb:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: whusnet-reverb-prod
    restart: always
    working_dir: /var/www
    command: php artisan reverb:start --host=0.0.0.0 --port=8081
    ports:
      - "8081:8081"
    volumes:
      - storage_data:/var/www/storage
      - cache_data:/var/www/bootstrap/cache
    environment:
      APP_KEY: ${APP_KEY}
      APP_ENV: production
      CACHE_DRIVER: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network

  # ─────────────────────────────────────────
  #  SCHEDULER — Laravel Cron
  # ─────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: whusnet-scheduler-prod
    restart: always
    working_dir: /var/www
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    volumes:
      - storage_data:/var/www/storage
      - cache_data:/var/www/bootstrap/cache
    environment:
      APP_KEY: ${APP_KEY}
      APP_ENV: production
      QUEUE_CONNECTION: redis
      CACHE_DRIVER: redis
      CACHE_STORE: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      DB_HOST: db
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network

networks:
  app_network:

volumes:
  dbdata:
  storage_data:
  cache_data:
  redis_data:
