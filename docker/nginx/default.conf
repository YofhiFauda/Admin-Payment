server {
    listen 80;
    index index.php index.html;
    server_name localhost;
    root /var/www/public;

    # Allow large uploads
    client_max_body_size 64M;

    # Serve storage files directly as static assets (no PHP involved)
    location /storage/ {
        alias /var/www/storage/app/public/;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri $uri/ =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # ── Cloudflare Tunnel headers ──────────────────────────────────
        # Beritahu PHP bahwa request masuk via HTTPS (dari Cloudflare).
        # Tanpa ini, SESSION_SECURE_COOKIE=true akan men-set cookie dengan
        # flag Secure, tapi karena PHP menganggap koneksi HTTP, cookie tidak
        # akan dikirim balik oleh browser untuk POST requests → 403 di auth.
        fastcgi_param HTTPS                on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;

        # Teruskan IP asli pengguna (dari Cloudflare) ke Laravel
        fastcgi_param HTTP_X_REAL_IP       $http_x_real_ip;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
    }

    location ~ /\.ht {
        deny all;
    }
}
