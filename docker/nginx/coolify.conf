# ═══════════════════════════════════════════════════════════════════
#  NGINX Configuration for Coolify (Internal Proxy Only)
#  Traefik handles SSL, domain routing, and HTTP→HTTPS redirect
# ═══════════════════════════════════════════════════════════════════

resolver 127.0.0.11 valid=30s ipv6=off;

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=addr:10m;

# Upstream PHP-FPM (internal service name from docker-compose)
upstream php-fpm {
    server app:9000;
    keepalive 32;
}

# Upstream Reverb (WebSocket)
upstream reverb {
    server reverb:8081;
    keepalive 32;
}

# Single server block - HTTP only (Traefik handles HTTPS)
server {
    listen 80;
    server_name _;  # Catch-all: Traefik already filtered by Host header
    
    root /var/www/public;
    index index.php index.html;

    # ✅ 2. FORMAT ADD_HEADER YANG BENAR
    # Letakkan di dalam block 'server' atau 'location' sesuai kebutuhan
    # Biasanya diletakkan di block 'server' utama atau block location '/'
    
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Client settings
    client_max_body_size 64M;
    client_body_buffer_size 128k;
    
    # Timeouts
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 15;
    send_timeout 10;
    
    # Connection limiting
    limit_conn addr 10;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    
    # Logging
    access_log /var/log/nginx/access.log combined buffer=32k flush=5s;
    error_log /var/log/nginx/error.log warn;
    
    # ─── Security Headers ──────────────────────────────────────────
    # HSTS: Only add if request came via HTTPS (from Traefik)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always if=$http_x_forwarded_proto = https;
    # add_header X-Frame-Options "SAMEORIGIN" always;
    # add_header X-Content-Type-Options "nosniff" always;
    # add_header X-XSS-Protection "1; mode=block" always;
    # add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss: https:;" always;
    
    # Hide nginx version
    server_tokens off;
    
    # ─── Static Files with Caching ─────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }
    
    # Storage files (user uploads)
    location /storage/ {
        alias /var/www/storage/app/public/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }
    
    # Vite build assets
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }
    
    # ─── Deny Sensitive Files ──────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # ─── Rate Limited Endpoints ────────────────────────────────────
    location ~ ^/login {
        limit_req zone=login burst=3 nodelay;
        try_files $uri /index.php?$query_string;
    }
    
    location ~ ^/api/ {
        limit_req zone=api burst=20 nodelay;
        try_files $uri /index.php?$query_string;
    }
    
    # ─── WebSocket Proxy for Laravel Reverb ────────────────────────
    location /app/ {
        proxy_pass http://reverb;
        proxy_http_version 1.1;
        
        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        
        # Forward real client info from Traefik
        proxy_set_header X-Real-IP $http_x_forwarded_for;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
        proxy_set_header X-Forwarded-Port $http_x_forwarded_port;
        
        # WebSocket timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Bypass cache for WebSocket
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
    }
    
    # ─── Health Check Endpoint (no rate limit) ─────────────────────
    location ~ ^/(ping|health|ready|alive|metrics)$ {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
    
    # ─── Main Laravel Application ──────────────────────────────────
    location / {
        limit_req zone=general burst=20 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # ─── PHP-FPM Handler ───────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        # ─── Forward headers from Traefik (CRITICAL) ───────────────
        # These tell Laravel the original request was HTTPS
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PORT $http_x_forwarded_port;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_REAL_IP $http_x_forwarded_for;
        
        # Set HTTPS flag based on Traefik header
        set $https_flag "";
        if ($http_x_forwarded_proto = "https") {
            set $https_flag "on";
        }
        fastcgi_param HTTPS $https_flag;
        
        # FastCGI optimizations
        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 16k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;
        fastcgi_connect_timeout 60;
        fastcgi_send_timeout 300;
        fastcgi_read_timeout 300;
        fastcgi_intercept_errors off;
    }
}