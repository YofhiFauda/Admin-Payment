; ═══════════════════════════════════════════════════════════════════
;  PHP Production Configuration
;  Optimized for performance and security
; ═══════════════════════════════════════════════════════════════════

[PHP]
; Error handling (production)
display_errors = Off
display_startup_errors = Off
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
log_errors = On
error_log = /var/www/storage/logs/php-errors.log

; File uploads
upload_max_filesize = 64M
post_max_size = 64M
max_file_uploads = 20

; Resource limits
memory_limit = 512M
max_execution_time = 300
max_input_time = 300
max_input_vars = 3000

; Session dikelola oleh Laravel (SESSION_DRIVER=redis di .env)
; Jangan set session.save_handler di sini — biarkan Laravel yang handle
session.gc_maxlifetime = 7200
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = "Lax"
session.use_strict_mode = 1
session.use_only_cookies = 1

; Security
expose_php = Off
allow_url_fopen = On
allow_url_include = Off
; ⚠️  proc_open & exec HARUS diizinkan untuk Horizon & Artisan
disable_functions = passthru,show_source

; OPcache (critical for production performance)
[opcache]

opcache.enable=1
opcache.enable_cli=1
opcache.memory_consumption=256
opcache.interned_strings_buffer=32
opcache.max_accelerated_files=30000
opcache.validate_timestamps=0
opcache.revalidate_freq=0
opcache.save_comments = 1
opcache.fast_shutdown = 1
opcache.enable_file_override = 1

; Preloading (Laravel 12) — disabled, no preload.php in project
; opcache.preload = /var/www/preload.php
; opcache.preload_user = www-data

; JIT (PHP 8.4)
opcache.jit=0
opcache.jit_buffer_size = 0

; Realpath cache
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; Date
date.timezone = Asia/Jakarta
