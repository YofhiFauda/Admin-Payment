# ═══════════════════════════════════════════════════════════════════
#  docker-compose.coolify.yml — WHUSNET Admin Payment
#  Coolify Production Configuration
# ═══════════════════════════════════════════════════════════════════
#
#  📌 Optimized for Coolify deployment with:
#     - Traefik integration (no nginx port exposure)
#     - Environment injection via Coolify UI
#     - Automatic SSL via Let's Encrypt
#     - Internal networking
#
# ═══════════════════════════════════════════════════════════════════

services:

  # ─────────────────────────────────────────
  #  APP — Laravel PHP-FPM
  # ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - APP_ENV=production
    image: whusnet-app:${APP_VERSION:-latest}
    container_name: whusnet-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - storage_data:/var/www/storage
      - cache_data:/var/www/bootstrap/cache
    environment:
      # ⚠️ Set these in Coolify Environment Variables UI
      APP_ENV: production
      APP_DEBUG: "false"
      CONTAINER_ROLE: app
      # DB_HOST, DB_DATABASE, etc. injected by Coolify
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php artisan list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────
  #  NGINX — Reverse Proxy (Internal)
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: whusnet-nginx
    restart: unless-stopped
    expose:
      - "80"  # Internal only - Traefik will proxy to this
    volumes:
      - ./docker/nginx/coolify.conf:/etc/nginx/conf.d/default.conf:ro
      - storage_data:/var/www/storage:ro
      - cache_data:/var/www/bootstrap/cache:ro
      # Explicit volume mounts (replacing deprecated volumes_from)
      - app_public:/var/www/public:ro
    depends_on:
      - app
    labels:
      # Coolify/Traefik labels for HTTP routing
      - "traefik.enable=true"
      - "traefik.http.routers.whusnet.rule=Host(`admin-payment.whusnet.com`)"
      - "traefik.http.routers.whusnet.entrypoints=websecure"
      - "traefik.http.routers.whusnet.tls=true"
      - "traefik.http.routers.whusnet.tls.certresolver=letsencrypt"
      - "traefik.http.services.whusnet.loadbalancer.server.port=80"
      # Optional: redirect HTTP to HTTPS
      - "traefik.http.routers.whusnet-http.rule=Host(`admin-payment.whusnet.com`)"
      - "traefik.http.routers.whusnet-http.entrypoints=web"
      - "traefik.http.routers.whusnet-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────
  #  DATABASE MySQL
  # ─────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: whusnet-db
    restart: unless-stopped
    environment:
      # ⚠️ Set these in Coolify Environment Variables UI
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    # Optional: only expose if you need external database access
    # ports:
    #   - "127.0.0.1:3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
      - ./docker/mysql/production.cnf:/etc/mysql/conf.d/production.cnf:ro
      - ./backups:/backups
    command: --default-authentication-plugin=mysql_native_password
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "mysql", "-h", "db", "-u${DB_USERNAME}", "-p${DB_PASSWORD}", "-e", "SELECT 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─────────────────────────────────────────
  #  REDIS — Cache + Queue + Session
  # ─────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: whusnet-redis
    restart: unless-stopped
    # Optional: only expose if you need external Redis access
    # ports:
    #   - "127.0.0.1:6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --tcp-backlog 511
      --timeout 0
      --tcp-keepalive 300
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────────
  #  HORIZON — Queue Worker
  # ─────────────────────────────────────────
  horizon:
    build:
      context: .
      dockerfile: Dockerfile
    image: whusnet-app:${APP_VERSION:-latest}
    container_name: whusnet-horizon
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan horizon
    volumes:
      - storage_data:/var/www/storage
      - cache_data:/var/www/bootstrap/cache
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      CONTAINER_ROLE: horizon
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "php artisan horizon:status | grep -q running"]
      interval: 60s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────
  #  REVERB — WebSocket Server
  # ─────────────────────────────────────────
  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    image: whusnet-app:${APP_VERSION:-latest}
    container_name: whusnet-reverb
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan reverb:start --host=0.0.0.0 --port=8081
    expose:
      - "8081"  # Internal only
    volumes:
      - storage_data:/var/www/storage
      - cache_data:/var/www/bootstrap/cache
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      CONTAINER_ROLE: reverb
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      # Coolify/Traefik labels for WebSocket routing
      - "traefik.enable=true"
      - "traefik.http.routers.whusnet-ws.rule=Host(`${APP_DOMAIN:-whusnet.example.com}`) && PathPrefix(`/app`)"
      - "traefik.http.routers.whusnet-ws.entrypoints=websecure"
      - "traefik.http.routers.whusnet-ws.tls=true"
      - "traefik.http.routers.whusnet-ws.tls.certresolver=letsencrypt"
      - "traefik.http.services.whusnet-ws.loadbalancer.server.port=8081"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────
  #  SCHEDULER — Laravel Cron
  # ─────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    image: whusnet-app:${APP_VERSION:-latest}
    container_name: whusnet-scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: >
      sh -c "while true; do
        php artisan schedule:run --verbose --no-interaction
        sleep 60
      done"
    volumes:
      - storage_data:/var/www/storage
      - cache_data:/var/www/bootstrap/cache
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      CONTAINER_ROLE: scheduler
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  dbdata:
    driver: local
  storage_data:
    driver: local
  cache_data:
    driver: local
  redis_data:
    driver: local
  app_public:
    driver: local