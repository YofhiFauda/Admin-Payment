# ═══════════════════════════════════════════════════════════════════
#  docker-compose.yaml — WHUSNET Admin Payment
#  Coolify Production Configuration (VPS 4GB)
# ═══════════════════════════════════════════════════════════════════
#
#  📌 Optimized for Coolify deployment with:
#     - Traefik integration (no nginx port exposure)
#     - Environment injection via Coolify UI
#     - Automatic SSL via Let's Encrypt
#     - Internal networking
#
#  💾 Memory Budget (4GB VPS):
#     - OS + Coolify + Traefik: ~1.2GB
#     - Containers (total limits): ~2.8GB
#     - Containers (total reservations): ~1.4GB
#
# ═══════════════════════════════════════════════════════════════════

services:

  # ─────────────────────────────────────────
  #  APP — Laravel PHP-FPM
  # ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - APP_ENV=production
        - VITE_REVERB_APP_KEY=${VITE_REVERB_APP_KEY}
        - VITE_REVERB_HOST=${VITE_REVERB_HOST}
        - VITE_REVERB_PORT=${VITE_REVERB_PORT:-443}
        - VITE_REVERB_SCHEME=${VITE_REVERB_SCHEME:-https}
    image: whusnet-app:${APP_VERSION:-latest}
    container_name: whusnet-app
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - .env
    volumes:
      - app_public:/var/www/public
      - storage_data:/var/www/storage
      - cache_data:/var/www/bootstrap/cache
    environment:
      # ⚠️ Set these in Coolify Environment Variables UI
      APP_ENV: production
      APP_DEBUG: "false"
      CONTAINER_ROLE: app
      # DB_HOST, DB_DATABASE, etc. injected by Coolify
    healthcheck:
      test: ["CMD-SHELL", "php artisan list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────
  #  NGINX — Reverse Proxy (Internal)
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: whusnet-nginx
    restart: unless-stopped
    expose:
      - "80"  # Internal only - Traefik will proxy to this
    networks:
      - coolify
      - default
    volumes:
      - ./docker/nginx/coolify.conf:/etc/nginx/conf.d/default.conf:ro
      - app_public:/var/www/public:ro
      - storage_data:/var/www/storage:ro
      - cache_data:/var/www/bootstrap/cache:ro
    depends_on:
      app:
        condition: service_healthy
      reverb:
        condition: service_started
    # Traefik labels dihapus. Routing HARUS diatur lewat UI Coolify (Domains)
    # untuk menghindari konflik dengan label bawaan sistem Coolify.
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.25'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────
  #  HORIZON — Queue Worker
  # ─────────────────────────────────────────
  horizon:
    image: whusnet-app:${APP_VERSION:-latest}
    container_name: whusnet-horizon
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - .env
    # command tidak perlu — entrypoint.sh handle via CONTAINER_ROLE=horizon
    volumes:
      - storage_data:/var/www/storage
      - cache_data:/var/www/bootstrap/cache
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      CONTAINER_ROLE: horizon
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "php artisan horizon:status | grep -q running"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────
  #  REVERB — WebSocket Server
  # ─────────────────────────────────────────
  reverb:
    image: whusnet-app:${APP_VERSION:-latest}
    container_name: whusnet-reverb
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - .env
    # command tidak perlu — entrypoint.sh handle via CONTAINER_ROLE=reverb
    expose:
      - "8081"  # Internal only — Nginx proxy ke sini
    volumes:
      - storage_data:/var/www/storage
      - cache_data:/var/www/bootstrap/cache
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      CONTAINER_ROLE: reverb
    depends_on:
      app:
        condition: service_healthy
    # ❌ Tidak ada Traefik labels di sini
    # WebSocket /app/ di-proxy via Nginx (coolify.conf location /app/)
    # Menghindari routing conflict antara Traefik dan Nginx
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null http://127.0.0.1:8081 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────
  #  SCHEDULER — Laravel Cron
  # ─────────────────────────────────────────
  scheduler:
    image: whusnet-app:${APP_VERSION:-latest}
    container_name: whusnet-scheduler
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - .env
    # command tidak perlu — entrypoint.sh handle via CONTAINER_ROLE=scheduler
    volumes:
      - storage_data:/var/www/storage
      - cache_data:/var/www/bootstrap/cache
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      CONTAINER_ROLE: scheduler
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 192M
        reservations:
          cpus: '0.1'
          memory: 96M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "php artisan list || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  storage_data:
    driver: local
  cache_data:
    driver: local
  app_public:
    driver: local

networks:
  coolify:
    external: true