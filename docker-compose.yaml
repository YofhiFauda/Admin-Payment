# ═══════════════════════════════════════════════════════════════════
#  docker-compose.yaml — WHUSNET Admin Payment
#  Coolify Production Configuration (VPS 4GB)
# ═══════════════════════════════════════════════════════════════════

services:

  # ─────────────────────────────────────────
  #  APP — Laravel PHP-FPM
  # ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - APP_ENV=production
        - REVERB_APP_KEY=${REVERB_APP_KEY}
        - VITE_REVERB_APP_KEY=${VITE_REVERB_APP_KEY}
        - VITE_REVERB_HOST=${VITE_REVERB_HOST}
        - VITE_REVERB_PORT=${VITE_REVERB_PORT:-443}
        - VITE_REVERB_SCHEME=${VITE_REVERB_SCHEME:-https}
    image: whusnet-app:${APP_VERSION:-latest}
    container_name: whusnet-app
    restart: unless-stopped
    working_dir: /var/www
    networks:
      - coolify
      - default
    env_file:
      - .env.production
    volumes:
      - app_public:/var/www/public
      - storage_data:/var/www/storage
      
      # ═══════════════════════════════════════════════════════════════
      # ⚠️ CATATAN: Individual File Mounts DIHAPUS
      # ═══════════════════════════════════════════════════════════════
      # File-file berikut TIDAK di-mount karena:
      # 1. Coolify tidak support individual file mounts (deployment error)
      # 2. File sudah ada di image via COPY . /var/www (Dockerfile line 56)
      # 3. Production best practice: immutable infrastructure
      #
      # File yang sebelumnya di-mount:
      # - ./config/pulse.php:/var/www/config/pulse.php:ro
      # - ./config/log-viewer.php:/var/www/config/log-viewer.php:ro
      # - ./app/Http/Middleware/LogViewerAuth.php:/var/www/app/Http/Middleware/LogViewerAuth.php:ro
      # - ./bootstrap/app.php:/var/www/bootstrap/app.php:ro
      # - ./app/Providers/AppServiceProvider.php:/var/www/app/Providers/AppServiceProvider.php:ro
      #
      # Jika perlu update file tersebut:
      # 1. Edit file → commit → push
      # 2. Redeploy di Coolify (rebuild image)
      # 3. File terbaru akan masuk ke image
      #
      # Lihat: VOLUME_MOUNTING_EXPLANATION.md untuk detail lengkap
      # ═══════════════════════════════════════════════════════════════
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      CONTAINER_ROLE: app
    healthcheck:
      test: ["CMD-SHELL", "pgrep php-fpm >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '0.70'
          memory: 512M
        reservations:
          cpus: '0.35'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────
  #  NGINX — Reverse Proxy (Internal)
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: whusnet-nginx
    restart: unless-stopped
    # ═══════════════════════════════════════════════════════════════
    # ⚠️ CATATAN: Port Mapping untuk Coolify
    # ═══════════════════════════════════════════════════════════════
    # Coolify menggunakan Traefik sebagai reverse proxy.
    # Port 80 di-expose ke internal network (coolify), bukan host.
    # Traefik akan route traffic dari domain ke container ini.
    #
    # Jika deployment gagal dengan "port already allocated":
    # 1. Hapus "ports:" section (uncomment expose:)
    # 2. Atau gunakan port yang berbeda
    # ═══════════════════════════════════════════════════════════════
    expose:
      - "80"
    # ports:
    #   - "8000:80"  # Hanya untuk local testing, comment untuk Coolify
    networks:
      - coolify
      - default
    env_file:
      - .env.production
    volumes:
      - ./docker/nginx/coolify.conf:/etc/nginx/conf.d/default.conf:ro
      - app_public:/var/www/public:ro
      - storage_data:/var/www/storage:ro
      # bootstrap/cache tidak perlu di nginx — hanya PHP yang butuh
    depends_on:
      app:
        condition: service_healthy
      reverb:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '0.20'
          memory: 128M
        reservations:
          cpus: '0.10'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/up || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────
  #  HORIZON — Queue Worker
  # ─────────────────────────────────────────
  horizon:
    image: whusnet-app:${APP_VERSION:-latest}
    container_name: whusnet-horizon
    restart: unless-stopped
    working_dir: /var/www
    networks:
      - coolify
      - default
    env_file:
      - .env.production
    volumes:
      - storage_data:/var/www/storage
      # bootstrap/cache dari image — tidak perlu shared volume
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      CONTAINER_ROLE: horizon
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'horizon' >/dev/null || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────
  #  REVERB — WebSocket Server
  # ─────────────────────────────────────────
  reverb:
    image: whusnet-app:${APP_VERSION:-latest}
    container_name: whusnet-reverb
    restart: unless-stopped
    working_dir: /var/www
    networks:
      - coolify
      - default
    # ═══════════════════════════════════════════════════════════════
    # ⚠️ CATATAN: Port Mapping untuk Coolify
    # ═══════════════════════════════════════════════════════════════
    # Reverb WebSocket server perlu expose port untuk Traefik routing.
    # Coolify akan configure Traefik untuk route WebSocket traffic.
    # ═══════════════════════════════════════════════════════════════
    expose:
      - "8081"
    # ports:
    #   - "8081:8081"  # Hanya untuk local testing, comment untuk Coolify
    volumes:
      - storage_data:/var/www/storage
      # bootstrap/cache dari image — tidak perlu shared volume
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      CONTAINER_ROLE: reverb
    env_file:
      - .env.production
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.20'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      # nc (netcat) lebih tepat untuk WebSocket — cukup cek port TCP terbuka
      # curl bisa return non-200 pada WebSocket server meski sebenarnya healthy
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8081 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────
  #  SCHEDULER — Laravel Cron
  # ─────────────────────────────────────────
  scheduler:
    image: whusnet-app:${APP_VERSION:-latest}
    container_name: whusnet-scheduler
    restart: unless-stopped
    working_dir: /var/www
    networks:
      - coolify
      - default
    env_file:
      - .env.production
    volumes:
      - storage_data:/var/www/storage
      # bootstrap/cache dari image — tidak perlu shared volume
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      CONTAINER_ROLE: scheduler
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 192M
        reservations:
          cpus: '0.05'
          memory: 96M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      # schedule:work adalah long-running process — pgrep lebih tepat dari 'ps aux | grep php'
      # 'ps aux | grep php' hampir selalu true karena grep itu sendiri muncul sebagai proses
      test: ["CMD-SHELL", "pgrep -f 'schedule:work' >/dev/null || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────
  #  PULSE — Performance Monitoring Worker
  # ─────────────────────────────────────────
  pulse:
    image: whusnet-app:${APP_VERSION:-latest}
    container_name: whusnet-pulse
    restart: unless-stopped
    working_dir: /var/www
    networks:
      - coolify
      - default
    env_file:
      - .env.production
    volumes:
      - storage_data:/var/www/storage
      # bootstrap/cache dari image — tidak perlu shared volume
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      CONTAINER_ROLE: pulse
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.30'
          memory: 512M
        reservations:
          cpus: '0.15'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      # pgrep lebih andal dari grep string — tidak fragile terhadap perubahan format ps
      test: ["CMD-SHELL", "pgrep -f 'pulse:work' >/dev/null || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

volumes:
  storage_data:
    driver: local
  app_public:
    driver: local
  # cache_data DIHAPUS — bootstrap/cache adalah bagian dari image, bukan persistent volume
  # Shared volume menyebabkan race condition saat app restart:
  #   - rm -f cache/* bisa membunuh worker yang sedang berjalan
  #   - horizon/scheduler/pulse bisa crash dengan behavior tak terduga

networks:
  coolify:
    external: true